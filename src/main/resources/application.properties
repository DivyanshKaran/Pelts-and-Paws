# ===========================
# Application
# ===========================
spring.application.name=pelts-paws-api
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

# ===========================
# Database
# Values can come from environment variables or from the local .env file.
# ===========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# HikariCP
# If you use a pooled provider like Neon PgBouncer, keep prepareThreshold=0.
# ===========================
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ===========================
# JPA / Hibernate
# (Schema is managed by schema.sql — Hibernate does NOT touch DDL)
# ===========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# SQL Initializer
# Runs schema.sql on every startup (idempotent — uses CREATE TABLE IF NOT EXISTS)
# ===========================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

# ===========================
# JWT
# app.jwt.secret must be valid Base64 and decode to at least 32 bytes.
# Provide it via environment variables or the local .env file.
# ===========================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ===========================
# External Pet APIs
# Leave blank locally unless you want seeded cat/dog data from external APIs.
# ===========================
app.catapi.key=${APP_CATAPI_KEY:}
app.dogapi.key=${APP_DOGAPI_KEY:}

# ===========================
# Logging
# ===========================
logging.level.com.peltspaws=DEBUG
logging.level.org.springframework.jdbc=DEBUG
